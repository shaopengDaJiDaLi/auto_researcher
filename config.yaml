# Auto Researcher Configuration
# See docs/architecture.md for detailed explanations

project:
  name: "my-research"
  brief: "PROJECT_BRIEF.md"
  workspace: "./workspace"

execution:
  # Where tools and training commands run:
  #   "local" — current behavior; use project.workspace on this machine
  #   "ssh"   — keep controller state local but run tools/training on one remote host
  #   "slurm" — submit training to a Slurm cluster via a login node. The controller
  #             stays local; jobs are submitted with `sbatch --parsable` over one
  #             transient ssh call that exits immediately (no login-node process is
  #             left running), and `sacct` is the sole liveness authority. File ops
  #             reuse the ssh path (login node shares the NFS workspace).
  mode: "local"
  ssh_host: ""                    # Required when mode="ssh"/"slurm", e.g. "user@login-node"
  remote_workspace: ""            # Required when mode="ssh"/"slurm", remote tool-visible workspace root
  remote_python: "python3"        # Python used on the remote host for the helper shim
  ssh_args: []                    # Optional extra ssh argv items, e.g. ["-p", "2222"]

  # --- mode="slurm" only (ignored otherwise) ---
  slurm_partition: ""             # Required in slurm mode: the partition/queue to submit to
  slurm_time: ""                  # Required in slurm mode: --time wall limit, e.g. "24:00:00" or "2-00:00:00"
  slurm_gpus_per_job: 1           # GPUs per job -> --gres=gpu:N (omit/0 to request none)
  slurm_gres: ""                  # Raw --gres override (e.g. "gpu:a100:2"); takes precedence over slurm_gpus_per_job
  slurm_qos: ""                   # Optional --qos
  slurm_account: ""               # Optional --account
  slurm_setup: ""                 # Optional shell line prepended to the job, e.g. "module load cuda/12.4"
  slurm_extra_sbatch: []          # Optional extra #SBATCH directives, e.g. ["--nodes=1", "--cpus-per-task=8"]
  slurm_unknown_grace_polls: 4    # Reap a job after this many consecutive unreachable sacct probes (anti-hang)
  slurm_time_buffer: 1800         # Force-reap a job this many seconds past its --time (anti-hang backstop)
  # NOTE: in slurm mode the launch_experiment `gpu` arg is IGNORED — Slurm assigns
  # GPUs via --gres (slurm_gpus_per_job), so CUDA_VISIBLE_DEVICES is stripped from jobs.

agent:
  # Provider:
  #   "anthropic"  — Anthropic-compatible SDK endpoint (default auth env: ANTHROPIC_API_KEY)
  #   "openai"     — OpenAI-compatible SDK endpoint (default auth env: OPENAI_API_KEY)
  #   "claude_cli" — subprocess, reuses Claude Code / Pro / Max subscription
  #   "codex_cli"  — subprocess, reuses ChatGPT Plus / Pro subscription
  #   domestic API presets (use a Chinese LLM API instead of a Claude/Codex subscription):
  #     "deepseek" | "qwen"/"dashscope" | "kimi"/"moonshot" | "glm"/"zhipu"
  #     Each preset auto-fills the OpenAI-compatible base_url and the default key env
  #     (DEEPSEEK_API_KEY / DASHSCOPE_API_KEY / MOONSHOT_API_KEY / ZHIPUAI_API_KEY);
  #     just set `model` to that vendor's model id. base_url/api_key_env stay
  #     overridable for other cloud API endpoints.
  #     e.g.  provider: "deepseek"   model: "deepseek-chat"   (export DEEPSEEK_API_KEY)
  #
  # The *_cli options are much cheaper when running many agents in parallel
  # because they share your existing subscription quota instead of per-token
  # billing. They require the corresponding CLI to be installed and logged
  # in once on this host.
  #
  # Tool-use compatibility: the worker path drives tools through a text-based
  # <tool_call> protocol. Compatible providers: "anthropic", "openai",
  # "claude_cli" (we force `--tools ""` so the CLI cannot bypass it).
  # "codex_cli" cannot be forced into pure-text mode by any current CLI flag,
  # so plain worker dispatch can bypass the ResearchToolRegistry and lose PID tracking.
  # For Codex-heavy runs, prefer role-specific config below plus
  # code_launch_provider: "builtin".
  provider: "anthropic"

  # Model selection per provider:
  #   anthropic:  claude-sonnet-4-6 (fast) | claude-opus-4-6 (strongest)
  #   openai:     codex-5.3 (fast)         | gpt-5.4 (strongest)
  #                or any OpenAI-compatible model id such as qwen / glm / minimax
  #   claude_cli: whichever model your `claude` CLI is configured to use
  #   codex_cli:  whichever model your `codex` CLI is configured to use
  model: "claude-sonnet-4-6"
  base_url: ""                    # Optional cloud API endpoint override
  api_key_env: ""                 # Optional custom key env, e.g. DASHSCOPE_API_KEY
  auth_token_env: ""              # Optional bearer-token env for anthropic-compatible endpoints

  # Optional role-specific provider overrides. Empty means inherit provider/model above.
  # Recommended Codex CLI pattern:
  #   leader_provider: "codex_cli"
  #   reflect_provider: "codex_cli"
  #   code_modify_provider: "codex_cli"
  #   code_launch_provider: "builtin"   # framework runs dry-run + launch_experiment
  #   idea_provider: "openai"           # keeps literature tools under ResearchToolRegistry
  #   writing_provider: "openai"
  leader_provider: ""
  leader_model: ""
  reflect_provider: ""
  reflect_model: ""
  idea_provider: ""
  idea_model: ""
  code_provider: ""
  code_model: ""
  code_modify_provider: ""
  code_modify_model: ""
  code_launch_provider: ""        # "" = legacy worker launches; "builtin" = controlled framework launch
  writing_provider: ""
  writing_model: ""

  max_cycles: -1                  # -1 = run forever
  max_steps_per_cycle: 3          # Max worker dispatches per cycle
  cooldown_interval: 300          # Smart cooldown polling interval (seconds)
  no_progress_fallback_threshold: 3  # Back off after repeated no-progress cycles on the same plan
  max_cycles_per_hour: 0          # Proactive anti-burn cap (0 = disabled): sleeps so the agent never exceeds this many cycles/hour

# --- v2 autonomy (all additive & advisory; they enrich the THINK context) ---

ledger:
  # Append-only workspace/experiments.jsonl recording every cycle's hypothesis,
  # metrics, and outcome. Survives crashes; zero LLM cost.
  enabled: true
  recent_in_context: 5            # How many recent experiments to show the leader
  metric_key: ""                  # Primary metric to track, e.g. "accuracy"/"loss"/"fgd". Empty disables stagnation/gate signals.
  metric_direction: "higher_better"  # "higher_better" or "lower_better"

stagnation:
  enabled: true                   # Requires ledger.metric_key
  threshold_cycles: 3             # Flag stagnation after N measured cycles with no improvement
  min_delta: 0.0                  # Minimum metric change that counts as improvement

journal:
  # Append-only DEAD_ENDS.md + INSIGHTS.md (never compacted; rotated to a dated
  # .bak when oversized). The loop shows their tails to the leader.
  enabled: true
  max_chars: 4000                 # Rotate a journal to backup once it exceeds this
  tail_in_context: 1500           # Chars of each journal tail to show the leader

safety:
  # Zero-cost violation scanner (pure functions over state.json + ledger).
  enabled: true
  fail_threshold: 3               # Flag after this many consecutive no-progress cycles
  stale_state_hours: 6            # Flag if state has been "running" this long without an update

gates:
  # Advisory phase gate: tells the leader whether the best metric clears a bar.
  enabled: false                  # Requires ledger.metric_key
  threshold: 0.0
  direction: "higher_better"

strategy:
  # Deterministic routing guard layered on top of the Leader's JSON decision.
  enabled: true
  require_initial_ideation: false       # true = first cycle runs Idea until an idea ledger entry exists
  stagnation_cycles_before_idea: 0      # >0 = route to Idea after metric/no-progress stagnation
  idea_to_code_handoff: true            # if last cycle was idea, next experiment cycle routes to Code
  require_dry_run: true                 # builtin code launch refuses to train without dry_run_command
  dry_run_timeout: 300

memory:
  brief_max_chars: 3000           # Tier 1: PROJECT_BRIEF cap
  log_max_chars: 2000             # Tier 2: MEMORY_LOG cap
  milestone_max_chars: 1200       # Key results section cap
  max_recent_entries: 15          # Rolling decision count

gpu:
  auto_detect: true               # Auto-detect available GPUs
  reserve_last: true              # Reserve last GPU for keep-alive

monitor:
  poll_interval: 900              # Check every 15 min during training
  zero_llm: true                  # No LLM calls during monitoring
  notify_on_complete: true        # Log notification on experiment completion

experiment:
  mandatory_dry_run: true         # Always dry-run before real training
  max_parallel: 1                 # Max concurrent experiments
  log_tail_lines: 50              # Lines to capture from training log

notes:
  enabled: false                  # Enable progress exports
  vault_path: ""                  # Optional: direct write into notes vault
  project_subdir: "AutoResearcher/{project_name}"
  dashboard_note: "Dashboard.md"
  daily_dir: "Daily"
  auto_append_daily: true
  local_fallback_dir: "progress_tracking"
